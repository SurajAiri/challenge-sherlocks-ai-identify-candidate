  - type: speaking_start
    participant_id: p_nina
  - type: audio_stream_on
    participant_id: p_nina
    data:
      {
        text: "No worries. How do you approach idempotency for payment retries?",
      }
  - type: transcript_segment
    participant_id: p_nina
    data:
      {
        text: "No worries. How do you approach idempotency for payment retries?",

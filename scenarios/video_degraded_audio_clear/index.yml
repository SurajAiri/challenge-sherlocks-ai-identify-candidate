evaluation:
  ground_truth_participant_id: p_dell
  difficulty: 2
  challenging_points:
    - "controls.video_fps (0.5) and controls.audio_chunk_ms (100) are set far apart from their defaults, in opposite directions, on purpose - this is the same scenario family as demo_clean's nickname mismatch but exists specifically to stress independent per-modality stream granularity rather than identity reasoning itself"
    - "The interviewer's own dialogue narrates the degraded video ('your video looks a little choppy'), giving a text-level hint that corroborates the stream-level reality - a thorough system could cross-check transcript content against actual stream statistics"
  expected_evidence:
    primary:
      - "p_dell answers every technical question and is addressed by first name ('Aiden') by the interviewer, matching context.candidate_name"
    secondary:
      - "The interviewer explicitly narrates degraded video quality in the transcript, consistent with the coarse video_fps setting"
    misleading:
      - "p_dell's display_name 'DESKTOP-7QK2P' has zero string overlap with context.candidate_name 'Aiden Brooks' and looks like an auto-generated machine hostname rather than any kind of human-chosen nickname"

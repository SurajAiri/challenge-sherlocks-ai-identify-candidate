metadata:
  name: "Coarse video sampling, fine-grained audio"
  slug: "video_degraded_audio_clear"
  description: >
    Deliberately sets controls.video_fps very low (0.5, i.e. one
    frame every two seconds) while keeping controls.audio_chunk_ms
    fine-grained (100ms), simulating a candidate on a bandwidth-
    constrained connection where video degrades but audio stays
    clean. Content-wise this is a simple nickname-mismatch case
    layered on top - the point isn't the identity puzzle, it's
    testing whether an Engine's video-dependent signals (face
    presence, webcam-based liveness/deepfake checks) degrade
    gracefully and confidence estimation correctly down-weights the
    video modality without discarding the still-solid audio and
    transcript evidence.

controls:
  speed_multiplier: 20.0
  generate_audio: true
  video_fps: 0.5
  audio_chunk_ms: 100

context:
  candidate_name: "Aiden Brooks"
  candidate_email: "aiden.brooks@example.com"
  interviewer_names: ["Nina Kowalski"]
  calendar_invite:
    organizer: "Nina Kowalski"
    title: "Backend Engineer Interview - Aiden Brooks"
  interview_schedule:
    start: "2026-07-20T14:00:00"
    duration_minutes: 30

participants:
  p_nina:
    display_name: "Nina Kowalski"
    role_hint: interviewer
  p_dell:
    display_name: "DESKTOP-7QK2P"
    role_hint: candidate

